<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Radhe · Admin — Writing Panel</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #0f0f0f;
    color: #e8e4de;
    min-height: 100vh;
    padding: 40px 24px;
  }
  .header {
    max-width: 800px;
    margin: 0 auto 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo { font-size: 22px; font-weight: 700; color: #FF9933; letter-spacing: -0.02em; }
  .logo span { color: #e8e4de; font-weight: 300; }
  .badge {
    font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
    background: rgba(255,153,51,0.15); color: #FF9933;
    border: 1px solid rgba(255,153,51,0.3); padding: 6px 14px; border-radius: 100px;
  }
  .container { max-width: 800px; margin: 0 auto; }
  h1 { font-size: 28px; font-weight: 300; color: #e8e4de; margin-bottom: 8px; letter-spacing: -0.02em; }
  .subtitle { font-size: 14px; color: rgba(232,228,222,0.45); margin-bottom: 32px; line-height: 1.6; }
  .global-bar {
    background: #1a1a1a; border: 1px solid rgba(255,255,255,0.07);
    border-radius: 12px; padding: 18px 24px; margin-bottom: 32px;
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
  }
  .global-bar p { font-size: 13px; color: rgba(232,228,222,0.5); line-height: 1.5; }
  .global-bar a { font-size: 13px; color: #FF9933; text-decoration: underline; text-underline-offset: 3px; white-space: nowrap; }
  .topic-card {
    background: #1a1a1a; border: 1px solid rgba(255,255,255,0.07);
    border-radius: 12px; padding: 32px; margin-bottom: 24px; transition: border-color 0.3s;
  }
  .topic-card:focus-within { border-color: rgba(255,153,51,0.4); }
  .topic-header { display: flex; align-items: center; gap: 14px; margin-bottom: 24px; }
  .topic-num { font-size: 12px; color: rgba(255,153,51,0.6); font-weight: 500; letter-spacing: 0.1em; }
  .topic-name { font-size: 20px; font-weight: 500; color: #e8e4de; letter-spacing: -0.01em; }
  .topic-tags { margin-left: auto; font-size: 11px; color: rgba(232,228,222,0.3); text-transform: uppercase; letter-spacing: 0.1em; }
  .topic-status {
    font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
    padding: 4px 10px; border-radius: 100px;
    background: rgba(255,153,51,0.12); color: #FF9933;
    border: 1px solid rgba(255,153,51,0.25); display: none;
  }
  .topic-status.visible { display: inline-block; }
  label { display: block; font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(232,228,222,0.4); margin-bottom: 8px; }
  .field { margin-bottom: 20px; }
  input[type="text"], textarea {
    width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px; color: #e8e4de; font-family: inherit; font-size: 14px;
    padding: 14px 16px; outline: none; transition: border-color 0.2s, background 0.2s;
    resize: vertical; line-height: 1.6;
  }
  input[type="text"]:focus, textarea:focus { border-color: rgba(255,153,51,0.5); background: rgba(255,153,51,0.04); }
  textarea { min-height: 200px; }
  .hint { font-size: 12px; color: rgba(232,228,222,0.3); margin-top: 6px; line-height: 1.5; }
  .card-footer { display: flex; align-items: center; gap: 12px; margin-top: 8px; flex-wrap: wrap; }
  .btn-save {
    background: #FF9933; color: #0f0f0f; border: none; border-radius: 8px;
    font-family: inherit; font-size: 13px; font-weight: 700; letter-spacing: 0.04em;
    padding: 12px 28px; cursor: pointer; transition: background 0.2s, transform 0.15s;
  }
  .btn-save:hover { background: #e6862e; transform: translateY(-1px); }
  .btn-save:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .btn-clear {
    background: transparent; color: rgba(232,228,222,0.3);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 8px;
    font-family: inherit; font-size: 13px; font-weight: 500;
    padding: 12px 20px; cursor: pointer; transition: color 0.2s, border-color 0.2s;
  }
  .btn-clear:hover { color: #e8e4de; border-color: rgba(255,255,255,0.2); }
  .saved-toast { font-size: 13px; color: #4caf50; opacity: 0; transition: opacity 0.3s; }
  .saved-toast.show { opacity: 1; }
  .error-toast { font-size: 13px; color: #f44336; opacity: 0; transition: opacity 0.3s; }
  .error-toast.show { opacity: 1; }
  .loading-bar {
    max-width: 800px; margin: 0 auto 24px;
    font-size: 13px; color: rgba(232,228,222,0.4);
    padding: 14px 20px; background: #1a1a1a;
    border-radius: 8px; border: 1px solid rgba(255,255,255,0.06);
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">Radhe <span>· Admin</span></div>
  <span class="badge">Writing Panel</span>
</div>

<div class="container">
  <h1>Write your articles</h1>
  <p class="subtitle">Changes save to Supabase and appear instantly for everyone visiting your portfolio.</p>

  <div class="global-bar">
    <p>Write → Save → visible to all visitors worldwide, instantly.</p>
    <a href="index.html" target="_blank">Open portfolio →</a>
  </div>

  <div class="loading-bar" id="loadingBar">⏳ Loading saved articles...</div>

  <div id="cards"></div>
</div>

<script>
const SUPABASE_URL = 'https://ipnvknrnfeopfccrsemed.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlwbnZrbnJuZmVvcGZjY3JzZW1kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyMjg0MzUsImV4cCI6MjA5NjgwNDQzNX0.ov7ukwuOnu3cRwbqmpgCSIHPD_iYQkFyeveNG71_VTc';

const TOPICS = [
  { id: 'geopolitics', num: '01', name: 'Geopolitics',             tags: 'Maps · Power · Doctrine' },
  { id: 'war',         num: '02', name: 'War & Conflict',          tags: 'Strategy · History' },
  { id: 'sanskrit',    num: '03', name: 'Sanskrit',                tags: 'Grammar · Poetry · Roots' },
  { id: 'mythology',   num: '04', name: 'Indian Mythology',        tags: 'Itihasa · Puranas' },
  { id: 'markets',     num: '05', name: 'Indian Markets',          tags: 'NSE · BSE · Macro' },
  { id: 'ir',          num: '06', name: 'International Relations', tags: 'Statecraft · Alliances' },
];

const headers = {
  'apikey': SUPABASE_KEY,
  'Authorization': 'Bearer ' + SUPABASE_KEY,
  'Content-Type': 'application/json'
};

// Load existing articles from Supabase
fetch(SUPABASE_URL + '/rest/v1/articles?select=topic,preview,body', { headers })
  .then(r => r.json())
  .then(rows => {
    const map = {};
    rows.forEach(r => { map[r.topic] = r; });
    buildCards(map);
    document.getElementById('loadingBar').textContent = '✓ Articles loaded. Edit and save below.';
    setTimeout(() => document.getElementById('loadingBar').style.display = 'none', 2000);
  })
  .catch(() => {
    buildCards({});
    document.getElementById('loadingBar').textContent = '⚠️ Could not load saved articles. Check your connection.';
  });

function buildCards(map) {
  const container = document.getElementById('cards');
  TOPICS.forEach(topic => {
    const saved = map[topic.id] || {};
    const card = document.createElement('div');
    card.className = 'topic-card';
    card.innerHTML = `
      <div class="topic-header">
        <span class="topic-num">${topic.num}</span>
        <span class="topic-name">${topic.name}</span>
        <span class="topic-tags">${topic.tags}</span>
        <span class="topic-status ${saved.preview ? 'visible' : ''}" id="status-${topic.id}">Saved</span>
      </div>
      <div class="field">
        <label>Preview — 1 or 2 sentences shown on the portfolio</label>
        <input type="text" id="preview-${topic.id}" placeholder="e.g. Power is not about armies — it's about who draws the map..." value="${esc(saved.preview)}" />
      </div>
      <div class="field">
        <label>Full article — shown when visitor clicks "Read more"</label>
        <textarea id="body-${topic.id}" placeholder="Write your full article here. Separate paragraphs with a blank line.">${esc(saved.body)}</textarea>
        <p class="hint">Separate paragraphs with a blank line. Each blank line = new paragraph on the portfolio.</p>
      </div>
      <div class="card-footer">
        <button class="btn-save" id="savebtn-${topic.id}" onclick="saveArticle('${topic.id}')">Save</button>
        <button class="btn-clear" onclick="clearArticle('${topic.id}')">Clear</button>
        <span class="saved-toast" id="toast-${topic.id}">✓ Live on your portfolio</span>
        <span class="error-toast" id="err-${topic.id}">✗ Save failed — try again</span>
      </div>
    `;
    container.appendChild(card);
  });
}

function saveArticle(id) {
  const preview = document.getElementById('preview-' + id).value.trim();
  const body    = document.getElementById('body-' + id).value.trim();
  const btn     = document.getElementById('savebtn-' + id);
  btn.disabled  = true;
  btn.textContent = 'Saving…';

  fetch(SUPABASE_URL + '/rest/v1/articles', {
    method: 'POST',
    headers: Object.assign({}, headers, { 'Prefer': 'resolution=merge-duplicates' }),
    body: JSON.stringify({ topic: id, preview: preview, body: body })
  })
  .then(r => {
    if (!r.ok) return r.text().then(t => { throw new Error(t); });
    document.getElementById('status-' + id).classList.add('visible');
    showToast('toast-' + id);
  })
  .catch(e => { console.error('Save error:', e); showToast('err-' + id); })
  .finally(() => {
    btn.disabled = false;
    btn.textContent = 'Save';
  });
}

function clearArticle(id) {
  if (!confirm('Clear this article? It will be removed from your portfolio.')) return;
  document.getElementById('preview-' + id).value = '';
  document.getElementById('body-' + id).value = '';
  fetch(SUPABASE_URL + '/rest/v1/articles', {
    method: 'POST',
    headers: Object.assign({}, headers, { 'Prefer': 'resolution=merge-duplicates' }),
    body: JSON.stringify({ topic: id, preview: '', body: '' })
  })
  .then(() => {
    document.getElementById('status-' + id).classList.remove('visible');
    showToast('toast-' + id);
  })
  .catch(() => showToast('err-' + id));
}

function showToast(id) {
  const el = document.getElementById(id);
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

function esc(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
